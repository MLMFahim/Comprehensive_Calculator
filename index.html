<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Dynamic Hub</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #08080a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            padding: 10px;
        }

        .app-container {
            background: linear-gradient(145deg, #0f0f12, #050507);
            width: 100%;
            max-width: 440px;
            height: 94vh;
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid #1a1a22;
        }

        /* Dynamic Tabs Header */
        .tabs-header {
            display: flex;
            background-color: rgba(10, 10, 14, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 20px 10px 20px;
            border-bottom: 1px solid #15151a;
            gap: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #4e4e5a;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .tab-btn.active {
            color: #ffffff;
            background-color: #16161f;
        }

        /* Viewport Carousel Windows */
        .tab-view-wrapper {
            flex: 1;
            display: flex;
            width: 200%; /* Accommodates side-by-side view sliding */
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-content {
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* ================= CALCULATOR VIEW ================= */
        .display {
            padding: 10px;
            text-align: right;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .display .history {
            color: #636366;
            font-size: 1.1rem;
            min-height: 26px;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .display .input-output {
            color: #ffffff;
            font-size: 3.4rem;
            font-weight: 300;
            overflow-x: auto;
            white-space: nowrap;
            margin-top: 5px;
        }

        .calc-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: auto;
        }

        .calc-grid button {
            border: none;
            outline: none;
            font-size: 1.3rem;
            font-weight: 500;
            border-radius: 50%;
            cursor: pointer;
            background: #1c1c1e;
            color: #ffffff;
            touch-action: manipulation;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .calc-grid button:active {
            transform: scale(0.92);
            background-color: #2c2c2e;
        }

        .calc-grid button.sci { color: #9a9a9f; font-size: 1.1rem; background: #121214; }
        .calc-grid button.op { color: #ff9f0a; font-size: 1.6rem; background: #1c1c1e; }
        .calc-grid button.util { color: #ff9f0a; font-size: 1.2rem; }
        .calc-grid button.equals { background: #ff9f0a; color: #ffffff; }
        .calc-grid button.equals:active { background: #ffb347; }

        /* ================= CONVERTER MENU VIEW ================= */
        .converter-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .menu-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #aeaeaeff;
            padding: 16px 8px;
            border-radius: 20px;
            background: linear-gradient(145deg, #16161a, #0e0e12);
            border: 1px solid #1c1c24;
            transition: all 0.2s ease;
        }

        .menu-item:active {
            transform: scale(0.95);
            background: #1c1c24;
            color: #ffffff;
        }

        .menu-item .icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .menu-item span {
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        /* Interactive Dynamic Panes */
        .conversion-pane, .special-pane {
            display: none;
            flex-direction: column;
            gap: 20px;
            background: #121216;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid #22222c;
            animation: paneSlideUp 0.3s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        @keyframes paneSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pane-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #22222c;
            padding-bottom: 14px;
        }

        .pane-header h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ff9f0a;
        }

        .back-btn {
            background: #1c1c24;
            border: none;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        .unit-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .unit-row label {
            font-size: 0.8rem;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }

        .unit-row select, .special-pane select {
            background: #1c1c24;
            color: white;
            border: 1px solid #2c2c3c;
            padding: 14px;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
            appearance: none;
        }

        .unit-row input, .special-pane input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #2c2c3c;
            color: white;
            font-size: 2rem;
            padding: 4px 0;
            outline: none;
            transition: border-color 0.2s;
        }
        .unit-row input:focus, .special-pane input:focus { border-color: #ff9f0a; }

        .double-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-box {
            background: linear-gradient(145deg, #1c1c24, #15151c);
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid #2a2a38;
            margin-top: 5px;
        }

        .result-box h4 { font-size: 1.8rem; color: #ff9f0a; font-weight: 600; margin-bottom: 4px; }
        .result-box p { font-size: 0.9rem; color: #8e8e93; }

        @media (max-width: 380px) {
            .calc-grid button { font-size: 1.15rem; }
            .converter-menu { gap: 12px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="tabs-header">
            <button class="tab-btn active" id="btn-calc" onclick="switchTab('calculator')">Calculator</button>
            <button class="tab-btn" id="btn-conv" onclick="switchTab('converter')">Converter</button>
        </div>

        <div class="tab-view-wrapper" id="view-wrapper">
            
            <div id="calculator" class="tab-content">
                <div class="display">
                    <div class="history" id="history"></div>
                    <div class="input-output" id="display-main">0</div>
                </div>
                <div class="calc-grid">
                    <button class="sci" data-val="2nd">2nd</button>
                    <button class="sci" data-val="deg">deg</button>
                    <button class="sci" data-val="Math.asin(">sin⁻¹</button>
                    <button class="sci" data-val="Math.acos(">cos⁻¹</button>
                    <button class="sci" data-val="Math.atan(">tan⁻¹</button>

                    <button class="sci" data-val="**">x<sup>y</sup></button>
                    <button class="sci" data-val="Math.LN10*Math.log10(">lg</button>
                    <button class="sci" data-val="Math.log(">ln</button>
                    <button class="sci" data-val="(">(</button>
                    <button class="sci" data-val=")">)</button>

                    <button class="sci" data-val="Math.sqrt(">√x</button>
                    <button class="util" data-val="ac">AC</button>
                    <button class="util" data-val="back">⌫</button>
                    <button class="op" data-val="*0.01">%</button>
                    <button class="op" data-val="/">÷</button>

                    <button class="sci" data-val="fact">x!</button>
                    <button class="num" data-val="7">7</button>
                    <button class="num" data-val="8">8</button>
                    <button class="num" data-val="9">9</button>
                    <button class="op" data-val="*">×</button>

                    <button class="sci" data-val="1/">1/x</button>
                    <button class="num" data-val="4">4</button>
                    <button class="num" data-val="5">5</button>
                    <button class="num" data-val="6">6</button>
                    <button class="op" data-val="-">−</button>

                    <button class="sci" data-val="Math.PI">π</button>
                    <button class="num" data-val="1">1</button>
                    <button class="num" data-val="2">2</button>
                    <button class="num" data-val="3">3</button>
                    <button class="op" data-val="+">+</button>

                    <button class="sci" data-val="expanded">⇄</button>
                    <button class="sci" data-val="Math.E">e</button>
                    <button class="num" data-val="0">0</button>
                    <button class="num" data-val=".">.</button>
                    <button class="equals" data-val="equal">=</button>
                </div>
            </div>

            <div id="converter" class="tab-content">
                <div class="converter-menu" id="menu-grid">
                    <div class="menu-item" onclick="openStandardConverter('Length')">
                        <div class="icon">📏</div><span>Length</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Mass')">
                        <div class="icon">⚖️</div><span>Mass</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Area')">
                        <div class="icon">📐</div><span>Area</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Time')">
                        <div class="icon">🕒</div><span>Time</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Volume')">
                        <div class="icon">🧪</div><span>Volume</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Speed')">
                        <div class="icon">💨</div><span>Speed</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Temperature')">
                        <div class="icon">🌡️</div><span>Temperature</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Data')">
                        <div class="icon">💾</div><span>Data</span>
                    </div>
                    <div class="menu-item" onclick="openStandardConverter('Numeral')">
                        <div class="icon">🔢</div><span>Numeral system</span>
                    </div>
                    <div class="menu-item" onclick="openSpecialPane('Discount')">
                        <div class="icon">🏷️</div><span>Discount</span>
                    </div>
                    <div class="menu-item" onclick="openSpecialPane('Date')">
                        <div class="icon">📅</div><span>Date</span>
                    </div>
                    <div class="menu-item" onclick="openSpecialPane('BMI')">
                        <div class="icon">🏃</div><span>BMI</span>
                    </div>
                </div>

                <div class="conversion-pane" id="conversion-pane">
                    <div class="pane-header">
                        <h3 id="pane-title">Converter</h3>
                        <button class="back-btn" onclick="closePanes()">✕ Back</button>
                    </div>
                    <div class="unit-row">
                        <label>From</label>
                        <select id="unit-from" onchange="runConversion()"></select>
                        <input type="number" id="val-from" value="1" oninput="runConversion()">
                    </div>
                    <div class="unit-row">
                        <label>To</label>
                        <select id="unit-to" onchange="runConversion()"></select>
                        <input type="number" id="val-to" readonly>
                    </div>
                </div>

                <div class="special-pane" id="discount-pane">
                    <div class="pane-header">
                        <h3>Discount Analyzer</h3>
                        <button class="back-btn" onclick="closePanes()">✕ Back</button>
                    </div>
                    <div class="unit-row"><label>Original Price</label><input type="number" id="disc-price" value="100" oninput="calcDiscount()"></div>
                    <div class="double-row">
                        <div class="unit-row"><label>Discount (%)</label><input type="number" id="disc-pct" value="20" oninput="calcDiscount()"></div>
                        <div class="unit-row"><label>Tax (%)</label><input type="number" id="disc-tax" value="0" oninput="calcDiscount()"></div>
                    </div>
                    <div class="result-box"><h4 id="disc-final">$80.00</h4><p id="disc-saved">You save: $20.00</p></div>
                </div>

                <div class="special-pane" id="date-pane">
                    <div class="pane-header">
                        <h3>Date Difference</h3>
                        <button class="back-btn" onclick="closePanes()">✕ Back</button>
                    </div>
                    <div class="unit-row"><label>Start Date</label><input type="date" id="date-start" onchange="calcDateDiff()"></div>
                    <div class="unit-row"><label>End Date</label><input type="date" id="date-end" onchange="calcDateDiff()"></div>
                    <div class="result-box"><h4 id="date-result">0 Days</h4><p>Total separation matrix window</p></div>
                </div>

                <div class="special-pane" id="bmi-pane">
                    <div class="pane-header">
                        <h3>BMI Calculator</h3>
                        <button class="back-btn" onclick="closePanes()">✕ Back</button>
                    </div>
                    <div class="double-row">
                        <div class="unit-row"><label>Weight (kg)</label><input type="number" id="bmi-weight" value="70" oninput="calcBMI()"></div>
                        <div class="unit-row"><label>Height (cm)</label><input type="number" id="bmi-height" value="175" oninput="calcBMI()"></div>
                    </div>
                    <div class="result-box"><h4 id="bmi-score">22.86</h4><p id="bmi-status">Normal weight</p></div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Fluid Sliding Layout Engine Setup
        const viewWrapper = document.getElementById('view-wrapper');
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabId === 'calculator') {
                document.getElementById('btn-calc').classList.add('active');
                viewWrapper.style.transform = 'translateX(0%)';
            } else {
                document.getElementById('btn-conv').classList.add('active');
                viewWrapper.style.transform = 'translateX(-50%)';
            }
            closePanes();
        }

        function closePanes() {
            document.getElementById('conversion-pane').style.display = 'none';
            document.getElementById('discount-pane').style.display = 'none';
            document.getElementById('date-pane').style.display = 'none';
            document.getElementById('bmi-pane').style.display = 'none';
            document.getElementById('menu-grid').style.opacity = '1';
            document.getElementById('menu-grid').style.display = 'grid';
        }

        // ================= CALCULATOR CORE INTERACTION RUNTIME =================
        const displayMain = document.getElementById('display-main');
        const displayHistory = document.getElementById('history');
        let currentExpression = '';

        document.querySelectorAll('.calc-grid button').forEach(button => {
            const tapHandler = (e) => {
                e.preventDefault();
                processInput(button.getAttribute('data-val'));
            };
            button.addEventListener('touchstart', tapHandler, { passive: false });
            button.addEventListener('click', tapHandler);
        });

        function processInput(val) {
            if (!val || val === '2nd' || val === 'deg' || val === 'expanded') return;
            if (val === 'ac') { currentExpression = ''; displayHistory.innerText = ''; displayMain.innerText = '0'; }
            else if (val === 'back') { currentExpression = currentExpression.slice(0, -1); updateDisplay(); }
            else if (val === 'equal') { calculate(); }
            else if (val === '1/') { currentExpression += '1/('; updateDisplay(); }
            else { currentExpression += val; updateDisplay(); }
        }

        function updateDisplay() {
            if (!currentExpression) { displayMain.innerText = '0'; return; }
            let formatted = currentExpression
                .replace(/Math\.asin\(/g, 'asin(').replace(/Math\.acos\(/g, 'acos(').replace(/Math\.atan\(/g, 'atan(')
                .replace(/Math\.LN10\*Math\.log10\(/g, 'lg(').replace(/Math\.log\(/g, 'ln(').replace(/Math\.sqrt\(/g, '✓(')
                .replace(/\*\*/g, '^').replace(/\*/g, '×').replace(/\//g, '÷').replace(/Math\.PI/g, 'π').replace(/Math\.E/g, 'e');
            displayMain.innerText = formatted;
        }

        function calculate() {
            try {
                let evalTarget = currentExpression;
                if (evalTarget.includes('fact')) {
                    evalTarget = evalTarget.replace(/(\d+)(calcFact\(\)|fact)/g, function(m, p1) {
                        let f = 1; for(let i=2; i<=parseInt(p1); i++) f*=i; return f;
                    });
                }
                let finalVal = eval(evalTarget);
                displayHistory.innerText = displayMain.innerText + ' =';
                displayMain.innerText = Number(finalVal.toFixed(6));
                currentExpression = finalVal.toString();
            } catch {
                displayMain.innerText = 'Error';
                currentExpression = '';
            }
        }

        // ================= CONVERTER COMPLEX MATRICES =================
        const conversionMatrix = {
            Length: { units: ['Meters', 'Kilometers', 'Centimeters', 'Miles', 'Feet'], factors: { Meters: 1, Kilometers: 1000, Centimeters: 0.01, Miles: 1609.34, Feet: 0.3048 } },
            Mass: { units: ['Kilograms', 'Grams', 'Pounds', 'Ounces'], factors: { Kilograms: 1, Grams: 0.001, Pounds: 0.453592, Ounces: 0.0283495 } },
            Area: { units: ['Square Meters', 'Square Kilometers', 'Acres', 'Hectares'], factors: { 'Square Meters': 1, 'Square Kilometers': 1000000, Acres: 4046.86, Hectares: 10000 } },
            Time: { units: ['Seconds', 'Minutes', 'Hours', 'Days', 'Weeks'], factors: { Seconds: 1, Minutes: 60, Hours: 3600, Days: 86400, Weeks: 604800 } },
            Volume: { units: ['Liters', 'Milliliters', 'Gallons', 'Cups'], factors: { Liters: 1, Milliliters: 0.001, Gallons: 3.78541, Cups: 0.236588 } },
            Speed: { units: ['m/s', 'km/h', 'mph', 'Knots'], factors: { 'm/s': 1, 'km/h': 0.277778, mph: 0.44704, Knots: 0.514444 } },
            Data: { units: ['Bytes', 'Kilobytes (KB)', 'Megabytes (MB)', 'Gigabytes (GB)', 'Terabytes (TB)'], factors: { Bytes: 1, 'Kilobytes (KB)': 1024, 'Megabytes (MB)': 1048576, 'Gigabytes (GB)': 1073741824, 'Terabytes (TB)': 1099511627776 } }
        };

        let activeConversionCategory = '';

        function openStandardConverter(category) {
            activeConversionCategory = category;
            document.getElementById('menu-grid').style.display = 'none';
            document.getElementById('conversion-pane').style.display = 'flex';
            document.getElementById('pane-title').innerText = category + " Converter";

            const fromSelect = document.getElementById('unit-from');
            const toSelect = document.getElementById('unit-to');
            fromSelect.innerHTML = ''; toSelect.innerHTML = '';

            if (category === 'Temperature') {
                ['Celsius', 'Fahrenheit', 'Kelvin'].forEach(u => { fromSelect.add(new Option(u,u)); toSelect.add(new Option(u,u)); });
            } else if (category === 'Numeral') {
                ['Decimal', 'Hexadecimal', 'Octal', 'Binary'].forEach(u => { fromSelect.add(new Option(u,u)); toSelect.add(new Option(u,u)); });
            } else {
                conversionMatrix[category].units.forEach(u => { fromSelect.add(new Option(u,u)); toSelect.add(new Option(u,u)); });
            }
            if (toSelect.options.length > 1) toSelect.selectedIndex = 1;
            runConversion();
        }

        function runConversion() {
            const fromUnit = document.getElementById('unit-from').value;
            const toUnit = document.getElementById('unit-to').value;
            const inputField = document.getElementById('val-from');
            const outputField = document.getElementById('val-to');

            if (activeConversionCategory === 'Temperature') {
                let val = parseFloat(inputField.value);
                if (isNaN(val)) { outputField.value = ''; return; }
                let c = fromUnit === 'Celsius' ? val : fromUnit === 'Fahrenheit' ? (val-32)*5/9 : val-273.15;
                let finalVal = toUnit === 'Celsius' ? c : toUnit === 'Fahrenheit' ? (c*9/5)+32 : c+273.15;
                outputField.value = Number(finalVal.toFixed(4));
            } 
            else if (activeConversionCategory === 'Numeral') {
                let rawInput = inputField.value.trim();
                if (!rawInput) { outputField.value = ''; return; }
                let decBase = 0;
                try {
                    if(fromUnit==='Decimal') decBase = parseInt(rawInput, 10);
                    else if(fromUnit==='Hexadecimal') decBase = parseInt(rawInput, 16);
                    else if(fromUnit==='Octal') decBase = parseInt(rawInput, 8);
                    else if(fromUnit==='Binary') decBase = parseInt(rawInput, 2);
                    
                    if (isNaN(decBase)) throw new Error();

                    if(toUnit==='Decimal') outputField.value = decBase.toString(10);
                    else if(toUnit==='Hexadecimal') outputField.value = decBase.toString(16).toUpperCase();
                    else if(toUnit==='Octal') outputField.value = decBase.toString(8);
                    else if(toUnit==='Binary') outputField.value = decBase.toString(2);
                } catch { outputField.value = 'Invalid Entry'; }
            } 
            else {
                let val = parseFloat(inputField.value) || 0;
                let baseValue = val * conversionMatrix[activeConversionCategory].factors[fromUnit];
                let outValue = baseValue / conversionMatrix[activeConversionCategory].factors[toUnit];
                outputField.value = outValue.toString().includes('.') ? Number(outValue.toFixed(5)) : outValue;
            }
        }

        // ================= SPECIAL SUITE PANEL INTERACTION RUNTIME =================
        function openSpecialPane(paneKey) {
            document.getElementById('menu-grid').style.display = 'none';
            if (paneKey === 'Discount') {
                document.getElementById('discount-pane').style.display = 'flex'; calcDiscount();
            } else if (paneKey === 'Date') {
                let todayStr = new Date().toISOString().split('T')[0];
                document.getElementById('date-start').value = todayStr;
                document.getElementById('date-end').value = todayStr;
                document.getElementById('date-pane').style.display = 'flex'; calcDateDiff();
            } else if (paneKey === 'BMI') {
                document.getElementById('bmi-pane').style.display = 'flex'; calcBMI();
            }
        }

        function calcDiscount() {
            let price = parseFloat(document.getElementById('disc-price').value) || 0;
            let discount = parseFloat(document.getElementById('disc-pct').value) || 0;
            let tax = parseFloat(document.getElementById('disc-tax').value) || 0;
            
            let savings = price * (discount / 100);
            let subtotal = price - savings;
            let finalPrice = subtotal + (subtotal * (tax / 100));

            document.getElementById('disc-final').innerText = "$" + finalPrice.toFixed(2);
            document.getElementById('disc-saved').innerText = "You save: $" + savings.toFixed(2);
        }

        function calcDateDiff() {
            let d1 = new Date(document.getElementById('date-start').value);
            let d2 = new Date(document.getElementById('date-end').value);
            if(isNaN(d1) || isNaN(d2)) return;
            let absoluteDiff = Math.abs(d2 - d1);
            let totalDays = Math.ceil(absoluteDiff / (1000 * 60 * 60 * 24));
            document.getElementById('date-result').innerText = totalDays + " Days";
        }

        function calcBMI() {
            let w = parseFloat(document.getElementById('bmi-weight').value) || 0;
            let h = parseFloat(document.getElementById('bmi-height').value) || 0;
            if (w <= 0 || h <= 0) { document.getElementById('bmi-score').innerText = "0.0"; return; }
            let bmi = w / ((h / 100) ** 2);
            document.getElementById('bmi-score').innerText = bmi.toFixed(2);

            let status = 'Normal weight';
            if(bmi < 18.5) status = 'Underweight';
            else if(bmi >= 25 && bmi < 29.9) status = 'Overweight';
            else if(bmi >= 30) status = 'Obese';
            document.getElementById('bmi-status').innerText = status;
        }
    </script>
</body>
</html>
